<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Offer Analyzer</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: #0b0b10;
        --muted: #6b7280;
        --bg: #ffffff;
        --border: #e5e7eb;
        --accent: #6d28d9;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #f5f5f7;
          --muted: #9ca3af;
          --bg: #0b0b10;
          --border: rgba(255, 255, 255, 0.1);
          --accent: #a78bfa;
        }
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        width: 320px;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
          sans-serif;
        font-size: 13px;
        line-height: 1.45;
      }
      .container {
        padding: 16px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .brand-mark {
        width: 22px;
        height: 22px;
        background: var(--fg);
        color: var(--bg);
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-weight: 700;
        font-size: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      h1 {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0;
      }
      p {
        color: var(--muted);
        margin: 6px 0 12px;
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      button {
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        padding: 9px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--fg);
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      button.primary {
        background: var(--fg);
        color: var(--bg);
        border-color: var(--fg);
      }
      button:hover:not(:disabled) {
        border-color: var(--accent);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .footer {
        margin-top: 14px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
      .err {
        color: #b91c1c;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="brand">
        <div class="brand-mark">/j</div>
        <h1>Job Offer Analyzer</h1>
      </div>
      <p>
        Open a posting on LinkedIn, Welcome to the Jungle, Indeed or
        JobTeaser, then click below.
      </p>
      <div class="actions">
        <button id="analyze" class="primary">Analyse this posting</button>
        <button id="open-app">Open the app</button>
      </div>
      <p id="status" class="err" hidden></p>
      <div class="footer">v0.1 · runs locally</div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
